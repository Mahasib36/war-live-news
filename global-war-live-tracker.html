<!DOCTYPE html>
<html>
<head>
<title>Global War Live Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#dc2626;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
}

.news{
flex:1;
padding:20px;
min-width:300px;
}

.map{
flex:1;
min-width:300px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

iframe{
width:100%;
height:400px;
border:none;
}

</style>

</head>

<body>

<header>
🌍 Global War Live Tracker
</header>

<div class="container">

<div class="news">

<h2>Latest Updates</h2>

<div id="news">Loading news...</div>

</div>

<div class="map">

<h2 style="padding:20px;">Live World Map</h2>

<iframe src="https://www.google.com/maps/embed"></iframe>

</div>

</div>

<script>

function loadNews(){

const rssUrl =
"https://api.allorigins.win/get?url=" +
encodeURIComponent("https://news.google.com/rss/search?q=Iran+USA+war&hl=en-US&gl=US&ceid=US:en");

fetch(rssUrl)

.then(res => res.json())

.then(data => {

let parser = new DOMParser();

let xml = parser.parseFromString(data.contents,"text/xml");

let items = xml.querySelectorAll("item");

let html = "";

items.forEach((el,i)=>{

if(i<8){

let title = el.querySelector("title").textContent;

let link = el.querySelector("link").textContent;

html += `
<div class="card">
<h3>${title}</h3>
<a href="${link}" target="_blank">Read More</a>
</div>
`;

}

});

document.getElementById("news").innerHTML = html;

});

}

loadNews();

setInterval(loadNews,30000);

</script>

</body>
</html>
