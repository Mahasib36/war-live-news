<!DOCTYPE html>
<html>
<head>

<title>Global War Live Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#dc2626;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
}

.news{
flex:1;
min-width:300px;
padding:15px;
}

.map{
flex:1;
min-width:300px;
}

.card{
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

#map{
height:420px;
width:100%;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<header>
🌍 Global War Live Tracker
</header>

<div class="container">

<div class="news">

<h2>Latest War News</h2>

<div id="news">Loading news...</div>

</div>

<div class="map">

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([30,35],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

/* Example attack markers */

L.marker([32.0,53.0]).addTo(map)
.bindPopup("Iran Military Activity");

L.marker([31.7,35.2]).addTo(map)
.bindPopup("Israel Defense Alert");

L.marker([33.3,44.3]).addTo(map)
.bindPopup("US Base Iraq Alert");

/* NEWS */

function loadNews(){

const rss =
"https://api.allorigins.win/get?url=" +
encodeURIComponent("https://news.google.com/rss/search?q=war+attack+missile&hl=en-US&gl=US&ceid=US:en");

fetch(rss)

.then(res=>res.json())

.then(data=>{

let parser = new DOMParser();

let xml = parser.parseFromString(data.contents,"text/xml");

let items = xml.querySelectorAll("item");

let html="";

items.forEach((el,i)=>{

if(i<10){

let title=el.querySelector("title").textContent;
let link=el.querySelector("link").textContent;

html+=`
<div class="card">
${title}<br>
<a href="${link}" target="_blank">Read more</a>
</div>
`;

}

});

document.getElementById("news").innerHTML=html;

});

}

loadNews();

setInterval(loadNews,30000);

</script>

</body>
</html>
