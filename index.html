<!DOCTYPE html>
<html>
<head>

<title>Global War Command Center</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#dc2626;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;

}

.card{

background:#1e293b;
border-radius:10px;
padding:10px;

}

iframe{

width:100%;
height:350px;
border:none;

}

@media(max-width:800px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>
🌍 Global War with Macho
</header>

<div class="grid">

<div class="card">
<h3>Real Satellite Earth</h3>
<iframe src="https://earth.nullschool.net/"></iframe>
</div>

<div class="card">
<h3>World Conflict Dashboard</h3>
<iframe src="https://liveuamap.com/"></iframe>
</div>

<div class="card">
<h3>Aircraft Radar</h3>
<iframe src="https://globe.adsbexchange.com/"></iframe>
</div>

<div class="card">
<h3>Warship Tracker</h3>
<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:3"></iframe>
</div>

<div class="card">
<h3>Weather Radar</h3>
<iframe src="https://embed.windy.com/embed2.html?lat=25&lon=45&zoom=4&level=surface&overlay=radar"></iframe>
</div>

<div class="card">
<h3>Live CCTV</h3>
<iframe src="https://www.youtube.com/embed/live_stream?channel=UC16niRr50-MSBwiO3YDb3RA"></iframe>
</div>

</div>

</body>
</html>
